<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>まず、つくってみました。 — 表紙</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', 'Lato', sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .slide {
      width: 1280px; height: 720px; background: #f8fafc;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .accent-strip { position:absolute; left:0; top:0; bottom:0; width:8px; background:#3B82F6; }
    .top-rule { position:absolute; top:0; left:8px; right:0; height:3px; background:linear-gradient(to right, #3B82F6, transparent 60%); }
    .track-rail-1 { position:absolute; bottom:108px; left:0; right:0; height:2px; background:#0F1B2D; opacity:0.06; }
    .track-rail-2 { position:absolute; bottom:96px; left:0; right:0; height:2px; background:#0F1B2D; opacity:0.06; }
    .station-row { position:absolute; bottom:88px; left:80px; right:80px; display:flex; justify-content:space-between; align-items:center; pointer-events:none; }
    .station-dot { width:9px; height:9px; border-radius:50%; background:#3B82F6; opacity:0.15; flex-shrink:0; }
    .station-dot.major { width:12px; height:12px; opacity:0.22; }
    .corner-shape {
      position:absolute; right:0; top:0; bottom:0; width:320px;
      background:linear-gradient(to left, rgba(59,130,246,0.04) 0%, transparent 100%);
      border-left:1px solid rgba(59,130,246,0.08);
    }
    .grid-overlay {
      position:absolute; right:0; top:0; bottom:0; width:320px; opacity:0.4;
      background-image: repeating-linear-gradient(0deg, rgba(59,130,246,0.04) 0px, rgba(59,130,246,0.04) 1px, transparent 1px, transparent 40px),
                        repeating-linear-gradient(90deg, rgba(59,130,246,0.04) 0px, rgba(59,130,246,0.04) 1px, transparent 1px, transparent 40px);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="accent-strip"></div>
    <div class="top-rule"></div>
    <div class="corner-shape"></div>
    <div class="grid-overlay"></div>
    <div class="track-rail-1"></div>
    <div class="track-rail-2"></div>
    <div class="station-row">
      <div class="station-dot major"></div>
      <div class="station-dot"></div>
      <div class="station-dot"></div>
      <div class="station-dot major"></div>
      <div class="station-dot"></div>
      <div class="station-dot"></div>
      <div class="station-dot"></div>
      <div class="station-dot major"></div>
      <div class="station-dot"></div>
      <div class="station-dot"></div>
      <div class="station-dot major"></div>
    </div>
    <div style="position:relative; z-index:10; text-align:center; max-width:780px; padding:48px 64px;">
      <div style="display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px;">
        <i class="fas fa-train" style="font-size:44px; color:#3B82F6;"></i>
        <span style="font-family:'Lato',sans-serif; font-size:15px; font-weight:700; color:#0F1B2D; letter-spacing:0.2em; text-transform:uppercase;">豊橋鉄道株式会社</span>
      </div>
      <div style="font-family:'Lato',sans-serif; font-size:13px; font-weight:700; color:#3B82F6; letter-spacing:0.3em; text-transform:uppercase; margin-bottom:24px;">Idea → Prototype → Test</div>
      <div style="font-family:'Noto Sans JP',sans-serif; font-size:44px; font-weight:900; color:#0F1B2D; line-height:1.3; margin-bottom:24px;">まず、つくってみました。</div>
      <div style="width:80px; height:3px; background:#3B82F6; margin:0 auto 20px; border-radius:2px;"></div>
      <div style="font-family:'Noto Sans JP',sans-serif; font-size:17px; font-weight:400; color:#64748b; margin-bottom:44px;">現場のアイデアをすぐ形に、すぐテストできる。<br>AI × 低コスト開発で4つのデモをご用意しました。</div>
      <div style="display:flex; align-items:center; justify-content:center; gap:28px;">
        <div style="display:flex; align-items:center; gap:8px; font-family:'Lato',sans-serif; font-size:12px; color:#94a3b8; letter-spacing:0.05em;">
          <i class="fas fa-calendar-alt" style="font-size:15px; color:#3B82F6; opacity:0.7;"></i>
          <span>2026年3月</span>
        </div>
        <div style="width:1px; height:14px; background:#e2e8f0;"></div>
        <div style="display:flex; align-items:center; gap:8px; font-family:'Lato',sans-serif; font-size:12px; color:#94a3b8; letter-spacing:0.05em;">
          <i class="fas fa-user" style="font-size:15px; color:#3B82F6; opacity:0.7;"></i>
          <span>入社志望資料</span>
        </div>
        <div style="width:1px; height:14px; background:#e2e8f0;"></div>
        <div style="display:flex; align-items:center; gap:8px; font-family:'Lato',sans-serif; font-size:12px; color:#94a3b8; letter-spacing:0.05em;">
          <i class="fas fa-laptop-code" style="font-size:15px; color:#3B82F6; opacity:0.7;"></i>
          <span>デモアプリ付き</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
